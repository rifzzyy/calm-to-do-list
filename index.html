<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Green Calm To-Do 🌿</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins&family=Pacifico&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

<h1>To-Do List</h1>

<div id="dateDayRow"></div>

<p id="quote"></p>

<div class="notebook">
  <ul id="taskList"></ul>
</div>

<div class="inputBox">
  <input id="taskInput" placeholder="Add a task... (press Enter)">
  <button onclick="clearTasks()">🗑</button>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
